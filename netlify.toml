[build]
  command = "bun run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================
# SECURITY HEADERS - Enterprise Grade
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    # Cache control
    Cache-Control = "public, max-age=0, must-revalidate"
    
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    
    # HSTS - Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy - Production hardened
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://translate.google.com https://translate.googleapis.com https://www.gstatic.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com https://www.gstatic.com;
      font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net data:;
      img-src 'self' https: data: blob:;
      connect-src 'self' https://hook.eu1.make.com https://api.emailjs.com https://translate.googleapis.com;
      frame-src 'self' https://translate.google.com;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self' https://wa.me https://api.emailjs.com;
      object-src 'none';
      upgrade-insecure-requests;
    """

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Block sensitive paths
[[headers]]
  for = "/.env*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*.map"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
